site_name: Multimodal Vision AI Learning Center
site_description: Open Learning Platform for Multimodal Vision AI
site_author: Guoping Tan

site_url: https://multimodal-vision-ai.github.io/multimodal-document-ai-learning-center/

repo_name: multimodal-vision-ai/multimodal-document-ai-learning-center
repo_url: https://github.com/multimodal-vision-ai/multimodal-document-ai-learning-center


theme:

  name: material

  language: zh


  features:

    # 页面导航体验
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top

    # 文档体验
    - toc.follow
    - search.highlight
    - search.suggest

    # Github体验
    - content.code.copy
    - content.action.edit


  icon:

    repo: fontawesome/brands/github



plugins:

  - search



markdown_extensions:

  - admonition

  - tables

  - toc:
      permalink: true

  - attr_list

  - md_in_html

  - pymdownx.details

  - pymdownx.superfences

  - pymdownx.highlight

  - pymdownx.inlinehilite

  - pymdownx.magiclink

  - pymdownx.tabbed:
      alternate_style: true



